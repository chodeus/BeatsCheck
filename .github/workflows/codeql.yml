name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
  schedule:
    - cron: '27 3 * * 1'

jobs:
  analyze:
    uses: chodeus/chodeus-ops/.github/workflows/codeql.yml@main
    with:
      languages: '["python"]'
