name: "Docker Build & Publish"

# Triggers:
#   push.branches.main → always build (cheap via GHA cache)
#   push.tags.v*       → always build (releases must produce tagged images)
#   pull_request       → build-only (no push) for Dockerfile/scripts/app changes
#   workflow_dispatch  → manual
#
# Note: GitHub Actions applies `on.push.paths` to the whole push event
# (branches AND tags), so a path-filtered tag push would silently skip
# release builds. We keep paths filtering on pull_request only.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'scripts/**'
      - 'app/**'
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    uses: chodeus/chodeus-ops/.github/workflows/docker-build.yml@cc1c9a07a26103fb8b442aefa8a0bcf85e8be378 # main
    with:
      push: ${{ github.event_name != 'pull_request' }}
      build_args: |
        BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}
        VCS_REF=${{ github.sha }}
        VERSION=${{ github.ref_name }}
    secrets: inherit

  notify-failure:
    needs: build
    if: failure() && github.event_name != 'pull_request'
    uses: chodeus/chodeus-ops/.github/workflows/notify-discord.yml@cc1c9a07a26103fb8b442aefa8a0bcf85e8be378 # main
    with:
      event_type: build
      status: failure
      title: "❌ Docker build failed: ${{ github.ref_name }}"
      commit_sha: ${{ github.sha }}
    secrets: inherit
