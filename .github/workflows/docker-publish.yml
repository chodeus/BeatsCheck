name: "Docker Build & Publish"

# Triggers:
#   push.branches.main → always build (cheap via GHA cache)
#   push.tags.v*       → always build (releases must produce tagged images)
#   pull_request       → build-only (no push) for Dockerfile/scripts/app changes
#   workflow_dispatch  → manual
#
# Note: GitHub Actions applies `on.push.paths` to the whole push event
# (branches AND tags), so a path-filtered tag push would silently skip
# release builds. We keep paths filtering on pull_request only.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'scripts/**'
      - 'app/**'
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-number:
    runs-on: ubuntu-latest
    outputs:
      number: ${{ steps.count.outputs.number }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      - id: count
        run: echo "number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: build-number
    uses: chodeus/chodeus-ops/.github/workflows/docker-build.yml@3f45de2e4563b8d1ec8e385d9b0cdc5508657ce8 # main
    with:
      push: ${{ github.event_name != 'pull_request' }}
      build_args: |
        BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}
        VCS_REF=${{ github.sha }}
        VERSION=${{ github.ref_name }}
        BUILD_NUMBER=${{ needs.build-number.outputs.number }}
    secrets: inherit

  notify-failure:
    needs: build
    if: failure() && github.event_name != 'pull_request'
    uses: chodeus/chodeus-ops/.github/workflows/notify-discord.yml@3f45de2e4563b8d1ec8e385d9b0cdc5508657ce8 # main
    with:
      event_type: build
      status: failure
      title: "❌ Docker build failed: ${{ github.ref_name }}"
      commit_sha: ${{ github.sha }}
    secrets: inherit
