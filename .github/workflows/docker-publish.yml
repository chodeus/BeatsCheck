name: Docker Build & Publish

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'Dockerfile'
      - 'scripts/**'
      - 'app/**'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'scripts/**'
      - 'app/**'
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    uses: chodeus/chodeus-ops/.github/workflows/docker-build.yml@main
    with:
      push: ${{ github.event_name != 'pull_request' }}
      build_args: |
        BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}
        VCS_REF=${{ github.sha }}
        VERSION=${{ github.ref_name }}
    secrets: inherit

  notify:
    if: always() && github.event_name != 'pull_request'
    needs: build
    uses: chodeus/chodeus-ops/.github/workflows/notify-discord.yml@main
    with:
      event_type: build
      status: ${{ needs.build.result == 'success' && 'success' || 'failure' }}
      commit_sha: ${{ github.sha }}
      image_tag: "ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
    secrets: inherit
